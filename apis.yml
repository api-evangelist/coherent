aid: coherent
name: Coherent
description: >-
  Coherent Corp. is a Fortune 500 global leader in materials, networking,
  and laser technologies. The company designs and manufactures engineered
  materials, optoelectronic components, optical transceivers, laser systems,
  and semiconductor manufacturing equipment for AI infrastructure,
  datacommunications, industrial, aerospace and defense, life sciences, and
  consumer electronics markets. This repository captures any APIs, developer
  tools, and machine-readable API artifacts associated with Coherent. No
  public developer APIs or documentation portal have been identified at this
  time.
